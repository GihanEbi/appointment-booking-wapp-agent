<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concierge AI — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6faff;
      color: #1a1f2e;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #e2e8f0; }
      .card { background: #161b22; }
      button { background: #6366f1; }
    }
    .icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; fill: white; }
    h1 { font-size: 20px; font-weight: 700; margin-top: 8px; }
    p { font-size: 14px; opacity: 0.6; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 10px 24px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 2L4.5 13H11L10 22L20.5 11H14L13 2Z"/>
    </svg>
  </div>
  <h1>You&rsquo;re offline</h1>
  <p>Check your internet connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
